name: MacSpace MySQL Backup - Retention 30 jours

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MySQL client
        run: sudo apt-get install -y mysql-client

      - name: Backup MacSpace Database
        run: |
          DATE=$(date +%Y-%m-%d_%H-%M-%S)
          FILENAME="macspace_backup_${DATE}.sql.gz"
          mkdir -p backups
          mysqldump \
            --host=${{ secrets.MYSQL_HOST }} \
            --port=${{ secrets.MYSQL_PORT }} \
            --user=${{ secrets.MYSQL_USER }} \
            --password=${{ secrets.MYSQL_PASSWORD }} \
            --single-transaction \
            --routines \
            --triggers \
            ${{ secrets.MYSQL_DATABASE }} | gzip > "backups/${FILENAME}"

      - name: Clean old backups - retention 30 days
        run: |
          find backups/ -name "*.sql.gz" -mtime +30 -delete

      - name: Commit and push backup
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Backup MacSpace - ${{ github.run_id }}"
          branch: main
